# Gateway z DWOMA listenerami: HTTP:80 + HTTPS:443. Uzywamy w czesci TLS.
#
# Aplikuj DOPIERO gdy w klastrze istnieje Secret `app-tls` (typu kubernetes.io/tls) —
# tworzy go albo openssl (tls/README.md, krok reczny), albo cert-manager
# (tls/certmanager-selfsigned.yaml). Bez tego Secretu listener `https` zostaje
# w stanie Invalid (Reason: InvalidCertificateRef) i calosc wyglada na zepsuta.
#
# Ten sam metadata.name co w gateway-http.yaml — `kubectl apply` nadpisuje obiekt,
# wiec nie trzeba nic kasowac, wystarczy zaaplikowac ten plik.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: training-gateway
  namespace: default
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate                # Envoy terminuje TLS, backend dostaje czysty HTTP
        certificateRefs:
          - kind: Secret
            name: app-tls              # Secret kubernetes.io/tls — patrz tls/
      allowedRoutes:
        namespaces:
          from: All
