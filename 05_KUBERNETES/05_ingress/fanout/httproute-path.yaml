# Routing po SCIEZCE (fanout) — jeden host, jeden HTTPRoute, dwie reguly path.
# Odpowiednik dawnego Ingress fanout, ale bez adnotacji rewrite — czysty spec.
#
#   demo.127-0-0-1.nip.io/echo  -> echo-app  (echo-server)
#   demo.127-0-0-1.nip.io/      -> demo-app  (nginx)
#
# Gateway API stosuje most-specific-match, wiec /echo wygrywa z / dla swojego prefixu.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fanout
spec:
  parentRefs:
    - name: training-gateway
  hostnames:
    - demo.127-0-0-1.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /echo
      backendRefs:
        - name: echo-app
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: demo-app
          port: 80
