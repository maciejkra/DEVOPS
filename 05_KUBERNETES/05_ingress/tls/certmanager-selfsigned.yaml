# cert-manager — issuer typu selfSigned. DZIALA LOKALNIE (Docker Desktop),
# bez publicznego IP i bez Helma. cert-manager sam wystawia cert i wrzuca go do
# Secretu `app-tls` (typ kubernetes.io/tls) — dokladnie tego, ktorego oczekuje
# gateway-https.yaml. To pokazuje, co cert-manager AUTOMATYZUJE w stosunku do
# recznego openssl-a z tls/README.md (produkcja Secretu + pozniejszy renewal).
#
# Instalacja cert-managera (bez Helma) — patrz ../README.md, sekcja TLS.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-tls
  namespace: default
spec:
  secretName: app-tls          # cert-manager utworzy ten Secret (kubernetes.io/tls)
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - demo.127-0-0-1.nip.io
    - nginx.127-0-0-1.nip.io
    - echo.127-0-0-1.nip.io
