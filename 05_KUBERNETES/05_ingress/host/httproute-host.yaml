# Routing po NAZWIE HOSTA (name-based virtual hosting) — dwa HTTPRoute, dwa rozne
# hostnames, ten sam Gateway. Odpowiednik dawnego Ingress z wieloma `host:`.
#
#   nginx.127-0-0-1.nip.io -> demo-app (nginx)
#   echo.127-0-0-1.nip.io  -> echo-app (echo-server)
#
# nip.io: kazda subdomena <cokolwiek>.127-0-0-1.nip.io rozwiazuje sie na 127.0.0.1,
# wiec nie trzeba ruszac /etc/hosts. Envoy dopasowuje regule po naglowku `Host`.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: host-nginx
spec:
  parentRefs:
    - name: training-gateway
  hostnames:
    - nginx.127-0-0-1.nip.io
  rules:
    - backendRefs:
        - name: demo-app
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: host-echo
spec:
  parentRefs:
    - name: training-gateway
  hostnames:
    - echo.127-0-0-1.nip.io
  rules:
    - backendRefs:
        - name: echo-app
          port: 80
