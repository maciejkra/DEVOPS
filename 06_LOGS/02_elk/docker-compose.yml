services:

  # OpenSearch (nastepca Elasticsearcha; Amazon Open Distro jest zlikwidowany).
  # Dla kursu wylaczamy plugin security (bez TLS/hasel) - prosciej na warsztacie.
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - 5601:5601
    depends_on:
      - opensearch

  # Fluent Bit zastepuje Filebeat: Filebeat OSS nie laczy sie juz z OpenSearch 2.0+
  # (mechanizm compatibility.override_main_response_version zostal usuniety).
  # Fluent Bit ma natywny output "opensearch".
  fluent-bit:
    image: fluent/fluent-bit:5.0.6
    ports:
      - "24224:24224"
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
    depends_on:
      opensearch:
        condition: service_healthy

  # Przykladowa aplikacja - logi ida przez docker logging driver "fluentd"
  # do Fluent Bita (input forward na :24224), a stamtad do OpenSearcha.
  app:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - fluent-bit
    logging:
      driver: fluentd
      options:
        fluentd-address: "127.0.0.1:24224"
        fluentd-async: "true"
        tag: "nginx"
