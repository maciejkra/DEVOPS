[SERVICE]
    Flush        1
    Log_Level    info

# Odbieramy logi protokolem forward (docker logging driver "fluentd").
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

# Wysylamy do OpenSearcha. Suppress_Type_Name On - wymagane dla OpenSearch/ES8
# (brak _type w API). Security wylaczone, wiec bez TLS i hasel.
[OUTPUT]
    Name              opensearch
    Match             *
    Host              opensearch
    Port              9200
    Index             docker-logs
    Suppress_Type_Name On
    tls               Off
