# Minimalny Loki w trybie SingleBinary (jeden pod) - do nauki na lokalnym klastrze.
# Chart grafana/loki zastapil deprecated grafana/loki-stack.
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true

deploymentMode: SingleBinary
singleBinary:
  replicas: 1

# Wylaczamy komponenty trybu rozproszonego i cache - niepotrzebne lokalnie.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
minio:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
