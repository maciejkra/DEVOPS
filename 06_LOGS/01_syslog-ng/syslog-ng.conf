@version: 4.11
@include "scl.conf"

# Odbieramy logi po sieci (docker syslog driver wysyla na tcp 514).
source s_network {
    network(transport("tcp") port(514));
};

# Piszemy do zamontowanego katalogu /var/log/syslogng/ (na hoscie: ./logs/).
# ${PROGRAM} to "tag" z docker logging drivera (http1 / http2),
# wiec dostajemy osobny plik per aplikacja: http1.log, http2.log.
destination d_files {
    file("/var/log/syslogng/${PROGRAM}.log" create-dirs(yes));
};

log {
    source(s_network);
    destination(d_files);
};
